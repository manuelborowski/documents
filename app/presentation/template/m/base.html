<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    {% block styles %}
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <title>Upload</title>
        <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@4.5.3/dist/css/bootstrap.min.css"
              integrity="sha384-TX8t27EcRE3e/ihU7zmQxVncDAy5uIKz4rEkgIXeMed4M0jlfIDPvg6uqKI2xXr2" crossorigin="anonymous">
        <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/sweetalert2@11.23.0/dist/sweetalert2.min.css"
              integrity="sha256-RHjk4NC06Gzv9DRXsogGrVjIZOc71LxqhydWMwMDhEU=" crossorigin="anonymous">
        <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/4.7.0/css/font-awesome.min.css">
        <link href="static/css/m/base.css" rel="stylesheet">
    {% endblock %}
</head>
<body>
<nav>
    <div style="display:flex;justify-content: flex-start;align-items: normal;">
        <div style="width:100%;text-align:start">
            {% if current_user.is_authenticated %}
                <ul id="navbar"></ul>
            {% endif %}
        </div>
        <i id="hamburger" class="fa fa-bars"></i>
    </div>
    {% block nav %}
    {% endblock %}
</nav>
<main id="main">
    {% block body %}
    {% endblock %}
</main>

<footer><p class="copyright text-muted small">{{ version }}</p></footer>
{% block scripts %}
    {{ JSGlue.include() }}
    <script src="https://ajax.googleapis.com/ajax/libs/jquery/3.5.1/jquery.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/socket.io/3.0.4/socket.io.js"
            integrity="sha512-aMGMvNYu8Ue4G+fHa359jcPb1u+ytAF+P2SCb+PxrjCdO3n3ZTxJ30zuH39rimUggmTwmh2u7wvQsDTHESnmfQ=="
            crossorigin="anonymous"></script>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@4.5.3/dist/js/bootstrap.bundle.min.js"
            integrity="sha384-ho+j7jyWK8fNQe+A12Hb8AhRq26LrZ/JpcUGGOn+Y7RsweNrtN/tE3MoK7ZeZDyx"
            crossorigin="anonymous"></script>
    <script type="text/javascript"
            src="https://cdnjs.cloudflare.com/ajax/libs/bootbox.js/5.5.2/bootbox.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11.23.0/dist/sweetalert2.all.min.js"
            integrity="sha256-+kMpHtNaVp0Vv0B9iX7tymEm7qv+6ASnck0/uuMeYNA=" crossorigin="anonymous"></script>
    <script>
        const current_user = {
            level: {{(current_user.level or null)|tojson}}, username: {{(current_user.username or null)|tojson }}
        };
        const suppress_navbar = {{ (suppress_navbar or False)|tojson}};
    </script>
    <script type="module">
        import {socketio} from "../../static/js/common/socketio.js";

        socketio.start();
    </script>
{% endblock %}
</body>
</html>
