<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/css/bootstrap.min.css" rel="stylesheet"
          integrity="sha384-1BmE4kWBq78iYhFldvKuhfTAU6auU8tT94WrHftjDbrCEXSU1oBoqyl2QvZ6jIW3" crossorigin="anonymous">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/sweetalert2@11.23.0/dist/sweetalert2.min.css"
          integrity="sha256-RHjk4NC06Gzv9DRXsogGrVjIZOc71LxqhydWMwMDhEU=" crossorigin="anonymous">
    <link rel="shortcut icon" href="static/img/{{ logo }}">
    <link href="static/css/login.css" rel="stylesheet">
    <link href="static/css/popup.css" rel="stylesheet">
    {{ JSGlue.include() }}

</head>
<body>
<div class="container">
    <div style="width:100%;display: flex;justify-content: space-between;">
        <img src="static/img/school-logo.png" style="width: 130px;">
        <div id="login" style="text-align: right; font-size: small;color:grey;">Aanmelden</div>
</div>
    <main class="content">
        <div style="display: flex;flex-wrap: wrap;">
            <div id="mobile-scanner-enable" style="display: flex;flex-direction: column;align-items: center;border-style: solid;background: #ffffff;border-radius: 30px;border-color: #e94c17;border-width: thick;" {% if qr_img == None %}hidden{% endif %}>
                <img id="login-url-img" src="data:image/png;base64,{{ qr_img }}" alt="QR Code" class="login-image">
                <b>{{ qr_caption }}</b><br>
            </div>
            <div style="display:flex;flex-direction: column; border-style: solid;margin-left: 20px;background: #ffffff; border-radius: 30px;border-color: #e94c17;border-width: thick;">
                <h1 style="text-align: center"><b>{{ title }}</b></h1>
                <img src="static/img/{{ logo }}" class="login-image" style="margin: 30px;">
                <a href="{{ url_for('auth.login_ss') }}" style="margin: 30px;"><img src="static/img/btn_smartschool.png" alt="aanmelden via smartschool"></a>
            </div>
        </div>
    </main>

    <footer class="footer">
        <p class="copyright text-muted small">{{ version }}</p>
    </footer>
</div>
<script src="https://ajax.googleapis.com/ajax/libs/jquery/3.5.1/jquery.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"
        integrity="sha384-YvpcrYf0tY3lHB60NNkmXc5s9fDVZLESaAA55NDzOxhy9GkcIdslK1eN7N6jIeHz"
        crossorigin="anonymous"></script>
<script type="text/javascript" src="https://cdnjs.cloudflare.com/ajax/libs/bootbox.js/6.0.0/bootbox.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/sweetalert2@11.23.0/dist/sweetalert2.all.min.js"
        integrity="sha256-+kMpHtNaVp0Vv0B9iX7tymEm7qv+6ASnck0/uuMeYNA=" crossorigin="anonymous"></script>
<script type="module">
    import {AlertPopup} from "../../static/js/common/popup.js";

    $(document).ready(function () {
        const message = {{ message|tojson or null }};
        if (message) new AlertPopup(message.status, message.data);
        document.getElementById("login").addEventListener("click", async e => {
            const result = await Swal.fire({
                html: `<form id="login-form" method="post">
                            <input placeholder="login" name="username" id="login"><br>
                            <input type="password" placeholder="password" name="password" style="margin-top:20px">
                            </form>`,
                confirmButtonText: `Aanmelden`,
                didOpen: () => {Swal.getHtmlContainer().querySelector("#login").focus()}

            });
            if (result.isConfirmed) {
                document.getElementById("login-form").submit();
            }
        });
    });
</script>
</body>
</html>
